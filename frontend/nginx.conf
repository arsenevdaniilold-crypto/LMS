server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Static assets built by Vite (hashed filenames -> long cache).
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA: serve index.html for any non-file route so Vue Router handles it.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API + health proxied to the backend service on the compose network.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 60m;  # allow 50MB uploads + overhead
    }

    location /health {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    # WebSocket endpoint (notifications) — needs upgrade headers.
    location /ws {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }
}
